<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UCA Academic Sanctuary</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo-container">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            </div>
            <h1>UCA - Dirección de Bienestar Universitario</h1>
            <p class="subtitle">Academic Sanctuary Portal</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='profile-selection.html';">
            <div class="form-group">
                <label>Correo Institucional</label>
                <div class="input-with-icon">
                    <i><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></i>
                    <input type="email" placeholder="usuario@uca.edu" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-with-icon">
                    <i><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-footer-links">
                <label class="remember-me">
                    <input type="checkbox"> Mantener sesión iniciada
                </label>
                <a href="#" class="forgot-pw">¿Olvidó su contraseña?</a>
            </div>

            <button type="submit" class="btn-primary">Ingresar</button>
        </form>

        <div class="login-bottom-info">
            Al ingresar, usted acepta los términos de uso y políticas de privacidad de la Universidad Católica Americana.
        </div>

        <div class="login-footer-nav">
            <a href="#"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Soporte</a>
            <a href="#"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Portal UCA</a>
        </div>
    </div>
</body>
</html>
